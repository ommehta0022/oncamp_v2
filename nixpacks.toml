[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["pip install --upgrade pip", "pip install -r requirements.txt"]

[phases.build]
cmds = ["python check_twilio.py || echo 'Twilio check skipped'"]

[start]
cmd = "python startup_check.py && uvicorn server:app --host 0.0.0.0 --port $PORT"
