[phases.setup]
nixPkgs = ["python311", "pip"]

[phases.install]
cmds = ["python3 -m pip install --upgrade pip", "python3 -m pip install -r requirements.txt"]

[phases.build]
cmds = ["python3 startup_check.py || echo 'Startup check skipped'"]

[start]
cmd = "python3 startup_check.py && python3 -m uvicorn server:app --host 0.0.0.0 --port $PORT"
